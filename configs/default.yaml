model:
  name: "mobilenet_v3_small"
  num_classes: 3
  pretrained: true
  dropout: 0.5

training:
  epochs: 5
  batch_size: 32
  learning_rate: 0.001
  weight_decay: 0.0001
  optimizer: "adam"
  scheduler: "cosine"

data:
  data_dir: "data/synthetic"
  classes: ["line", "parabola", "sine"]
  image_size: 128
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1
  num_workers: 4

output:
  checkpoint_dir: "outputs/checkpoints"
  log_dir: "outputs/logs"
